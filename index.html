<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#fafaf8"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="description" content="Track your subscriptions — renewals, costs, and savings at a glance."/>
<title>SubTracker</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://accounts.google.com/gsi/client" async></script>

<style>
/* ─── Tokens ────────────────────────────────────────────────────────────── */
:root {
  --cream:   #fafaf8;
  --cream2:  #f3f2ee;
  --cream3:  #eae8e1;
  --ink:     #141412;
  --ink2:    #3a3932;
  --ink3:    #7a7870;
  --accent:  #141412;
  --red:     #c0392b;
  --amber:   #b8860b;
  --green:   #2d6a4f;
  --blue:    #1a3a6b;
  --serif:   'Instrument Serif', Georgia, serif;
  --mono:    'Geist Mono', 'Courier New', monospace;
  --sans:    'Outfit', sans-serif;
  --radius:  14px;
  --shadow:  0 1px 3px rgba(20,20,18,.08), 0 4px 12px rgba(20,20,18,.04);
  --shadow-md: 0 2px 8px rgba(20,20,18,.1), 0 8px 24px rgba(20,20,18,.06);
}

/* ─── Reset ─────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--sans);
  background: var(--cream);
  color: var(--ink);
  min-height: 100dvh;
  overscroll-behavior: none;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; }
input, select, textarea { font-family: inherit; }

/* ─── Layout ─────────────────────────────────────────────────────────────── */
.app {
  max-width: 480px;
  margin: 0 auto;
  padding: 0 0 96px;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}

/* ─── Header ────────────────────────────────────────────────────────────── */
.header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(250,250,248,.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--cream3);
  padding: 16px 20px 12px;
}
.header-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.wordmark {
  font-family: var(--serif);
  font-size: 22px;
  letter-spacing: -.3px;
  color: var(--ink);
  line-height: 1;
}
.wordmark em {
  font-style: italic;
  color: var(--ink3);
}
.header-actions { display: flex; gap: 6px; align-items: center; }
.icon-btn {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  font-size: 18px;
  transition: background .15s;
  color: var(--ink);
}
.icon-btn:hover { background: var(--cream3); }

/* ─── Stats bar ─────────────────────────────────────────────────────────── */
.stats-bar {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 1px;
  background: var(--cream3);
  border-bottom: 1px solid var(--cream3);
}
.stat-cell {
  background: var(--cream);
  padding: 14px 12px 12px;
  text-align: center;
}
.stat-value {
  font-family: var(--mono);
  font-size: 18px;
  font-weight: 500;
  color: var(--ink);
  display: block;
  letter-spacing: -.5px;
}
.stat-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--ink3);
  margin-top: 2px;
  display: block;
}

/* ─── Action strip ──────────────────────────────────────────────────────── */
.action-strip {
  display: flex;
  gap: 10px;
  padding: 14px 20px;
  border-bottom: 1px solid var(--cream3);
}
.action-btn {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 13.5px;
  font-weight: 500;
  transition: all .15s;
}
.action-btn.primary {
  background: var(--ink);
  color: var(--cream);
}
.action-btn.primary:hover { background: var(--ink2); }
.action-btn.secondary {
  background: var(--cream2);
  color: var(--ink);
  border: 1px solid var(--cream3);
}
.action-btn.secondary:hover { background: var(--cream3); }
.action-btn:disabled { opacity: .45; pointer-events: none; }
.btn-icon { font-size: 15px; }

/* ─── Notification banner ───────────────────────────────────────────────── */
.notif-bar {
  margin: 0 20px 4px;
  padding: 10px 14px;
  border-radius: 10px;
  background: var(--cream2);
  border: 1px solid var(--cream3);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  font-size: 13px;
}
.notif-bar.hidden { display: none; }
.notif-text { color: var(--ink2); flex: 1; }
.notif-btn {
  font-size: 12px;
  font-weight: 600;
  padding: 5px 12px;
  background: var(--ink);
  color: var(--cream);
  border-radius: 6px;
}

/* ─── Install banner ────────────────────────────────────────────────────── */
.install-bar {
  margin: 8px 20px 0;
  padding: 12px 14px;
  border-radius: var(--radius);
  background: var(--cream2);
  border: 1px solid var(--cream3);
  font-size: 13px;
}
.install-bar.hidden { display: none; }
.install-bar-top {
  display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
}
.install-icon { font-size: 20px; }
.install-title { font-weight: 600; font-size: 14px; }
.install-sub { color: var(--ink3); font-size: 12px; }
.install-btns { display: flex; gap: 8px; }
.install-btn-yes {
  padding: 7px 16px; background: var(--ink); color: var(--cream);
  border-radius: 7px; font-size: 13px; font-weight: 500;
}
.install-btn-skip {
  padding: 7px 16px; background: transparent; color: var(--ink3);
  border-radius: 7px; font-size: 13px;
}

/* ─── Filters ───────────────────────────────────────────────────────────── */
.filters {
  display: flex;
  gap: 7px;
  padding: 12px 20px 8px;
  overflow-x: auto;
  scrollbar-width: none;
}
.filters::-webkit-scrollbar { display: none; }
.filter-chip {
  white-space: nowrap;
  padding: 6px 13px;
  border-radius: 20px;
  font-size: 12.5px;
  font-weight: 500;
  background: var(--cream2);
  color: var(--ink2);
  border: 1px solid var(--cream3);
  transition: all .15s;
  flex-shrink: 0;
}
.filter-chip.active {
  background: var(--ink);
  color: var(--cream);
  border-color: var(--ink);
}

/* ─── Alert strip ───────────────────────────────────────────────────────── */
.alert-strip {
  margin: 6px 20px;
  padding: 10px 14px;
  border-radius: 10px;
  background: #fff8e1;
  border: 1px solid #f0c040;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12.5px;
  color: var(--amber);
  font-weight: 500;
}
.alert-strip.hidden { display: none; }

/* ─── Card list ─────────────────────────────────────────────────────────── */
.section-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .09em;
  color: var(--ink3);
  padding: 10px 20px 4px;
  font-weight: 500;
}
.cards { padding: 0 20px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; }

.card {
  background: #fff;
  border-radius: var(--radius);
  border: 1px solid var(--cream3);
  box-shadow: var(--shadow);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 13px;
  cursor: pointer;
  transition: all .15s;
  position: relative;
  animation: slideIn .22s ease;
}
.card:hover { border-color: var(--ink3); box-shadow: var(--shadow-md); }
.card.due-soon { border-left: 3px solid var(--amber); }
.card.due-critical { border-left: 3px solid var(--red); }
@keyframes slideIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card-icon {
  width: 42px; height: 42px;
  border-radius: 10px;
  background: var(--cream2);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}
.card-body { flex: 1; min-width: 0; }
.card-name {
  font-size: 14.5px;
  font-weight: 600;
  color: var(--ink);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 3px;
  flex-wrap: wrap;
}
.card-cycle {
  font-size: 11px;
  background: var(--cream2);
  color: var(--ink3);
  padding: 2px 7px;
  border-radius: 4px;
  text-transform: capitalize;
  letter-spacing: .02em;
}
.card-category {
  font-size: 11px;
  color: var(--ink3);
}
.card-date {
  font-size: 11.5px;
  color: var(--ink3);
  margin-top: 2px;
  font-family: var(--mono);
}
.card-date.warn { color: var(--amber); }
.card-date.crit { color: var(--red); }

.card-right { text-align: right; flex-shrink: 0; }
.card-amount {
  font-family: var(--mono);
  font-size: 15px;
  font-weight: 500;
  color: var(--ink);
}
.card-mrp {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink3);
  text-decoration: line-through;
  margin-top: 1px;
}
.card-savings {
  font-size: 10.5px;
  color: var(--green);
  font-weight: 600;
  margin-top: 1px;
}
.card-bundled {
  font-size: 10px;
  color: var(--green);
  background: #e8f5e9;
  padding: 2px 7px;
  border-radius: 4px;
  margin-top: 3px;
  display: inline-block;
}

/* ─── Empty state ───────────────────────────────────────────────────────── */
.empty {
  text-align: center;
  padding: 60px 30px;
  display: none;
}
.empty.show { display: block; }
.empty-emoji { font-size: 40px; margin-bottom: 14px; }
.empty-title {
  font-family: var(--serif);
  font-size: 20px;
  color: var(--ink2);
  margin-bottom: 8px;
}
.empty-sub { font-size: 13.5px; color: var(--ink3); line-height: 1.5; }

/* ─── FAB ────────────────────────────────────────────────────────────────── */
.fab {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 40;
  width: 56px; height: 56px;
  background: var(--ink);
  color: var(--cream);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
  box-shadow: 0 4px 16px rgba(20,20,18,.25);
  transition: transform .15s, box-shadow .15s;
}
.fab:hover { transform: scale(1.07); box-shadow: 0 6px 20px rgba(20,20,18,.3); }
.fab:active { transform: scale(.96); }

/* ─── Modal backdrop ────────────────────────────────────────────────────── */
.backdrop {
  position: fixed; inset: 0;
  background: rgba(20,20,18,.4);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 100;
  display: none;
  align-items: flex-end;
  justify-content: center;
  padding: 0;
  animation: fadeIn .2s ease;
}
.backdrop.show { display: flex; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: var(--cream);
  border-radius: 20px 20px 0 0;
  width: 100%;
  max-width: 480px;
  max-height: 92dvh;
  overflow-y: auto;
  padding: 0 0 32px;
  animation: slideUp .25s ease;
}
@keyframes slideUp {
  from { transform: translateY(30px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}
.modal-handle {
  width: 36px; height: 4px;
  background: var(--cream3);
  border-radius: 2px;
  margin: 12px auto 16px;
}
.modal-title {
  font-family: var(--serif);
  font-size: 20px;
  padding: 0 20px 12px;
  border-bottom: 1px solid var(--cream3);
}
.modal-body { padding: 18px 20px 0; }

/* ─── Form ───────────────────────────────────────────────────────────────── */
.field { margin-bottom: 16px; }
.field label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .07em;
  color: var(--ink3);
  margin-bottom: 5px;
}
.field input, .field select, .field textarea {
  width: 100%;
  padding: 10px 13px;
  border: 1.5px solid var(--cream3);
  border-radius: 9px;
  background: #fff;
  font-size: 14.5px;
  color: var(--ink);
  transition: border-color .15s;
  outline: none;
  appearance: none;
  -webkit-appearance: none;
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color: var(--ink);
}
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.icon-picker {
  display: flex; gap: 8px; flex-wrap: wrap;
}
.icon-pick {
  width: 40px; height: 40px;
  border-radius: 8px;
  border: 1.5px solid var(--cream3);
  font-size: 20px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all .12s;
}
.icon-pick:hover { border-color: var(--ink2); }
.icon-pick.selected { border-color: var(--ink); background: var(--cream2); }

.form-actions { display: flex; gap: 10px; margin-top: 20px; padding: 0 20px; }
.btn-cancel {
  flex: 1; padding: 12px;
  border-radius: 10px;
  font-size: 14px; font-weight: 500;
  background: var(--cream2);
  color: var(--ink2);
  border: 1px solid var(--cream3);
}
.btn-save {
  flex: 2; padding: 12px;
  border-radius: 10px;
  font-size: 14px; font-weight: 600;
  background: var(--ink);
  color: var(--cream);
  transition: background .15s;
}
.btn-save:hover { background: var(--ink2); }

/* ─── Detail modal ──────────────────────────────────────────────────────── */
.detail-hero {
  display: flex; align-items: center; gap: 14px;
  padding: 18px 20px;
  border-bottom: 1px solid var(--cream3);
}
.detail-icon {
  width: 52px; height: 52px;
  border-radius: 13px;
  background: var(--cream2);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
}
.detail-name {
  font-family: var(--serif);
  font-size: 22px;
  color: var(--ink);
}
.detail-cat { font-size: 12.5px; color: var(--ink3); margin-top: 2px; }
.detail-rows { padding: 14px 20px; display: flex; flex-direction: column; gap: 12px; }
.detail-row {
  display: flex; justify-content: space-between; align-items: center;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--cream2);
}
.detail-row:last-child { border-bottom: none; }
.detail-key { font-size: 12.5px; color: var(--ink3); font-weight: 500; }
.detail-val { font-size: 14px; color: var(--ink); font-family: var(--mono); font-weight: 500; }
.detail-actions { display: flex; gap: 10px; padding: 4px 20px 0; }
.btn-delete {
  flex: 1; padding: 11px;
  border-radius: 10px;
  font-size: 13.5px; font-weight: 500;
  background: #fff0ef;
  color: var(--red);
  border: 1px solid #ffd5d2;
}
.btn-edit {
  flex: 2; padding: 11px;
  border-radius: 10px;
  font-size: 13.5px; font-weight: 600;
  background: var(--ink); color: var(--cream);
}

/* ─── Toast ─────────────────────────────────────────────────────────────── */
.toast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
  background: var(--ink); color: var(--cream);
  padding: 10px 20px; border-radius: 10px;
  font-size: 13.5px; font-weight: 500;
  z-index: 200;
  pointer-events: none;
  opacity: 0; transition: opacity .2s;
  white-space: nowrap;
}
.toast.show { opacity: 1; }

/* ─── Scan status ───────────────────────────────────────────────────────── */
.scan-status {
  margin: 6px 20px;
  padding: 10px 14px;
  border-radius: 10px;
  background: #e8f4fd;
  border: 1px solid #bee3f8;
  font-size: 12.5px;
  color: var(--blue);
  display: none;
  align-items: center;
  gap: 8px;
}
.scan-status.show { display: flex; }
.scan-spinner { animation: spin .8s linear infinite; display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="app">
  <!-- HEADER -->
  <header class="header">
    <div class="header-row">
      <span class="wordmark">Sub<em>Tracker</em></span>
      <div class="header-actions">
        <button class="icon-btn" id="sortBtn" title="Sort" aria-label="Sort">⇅</button>
        <button class="icon-btn" id="installIconBtn" title="Install app" aria-label="Install app" style="display:none">📲</button>
      </div>
    </div>
  </header>

  <!-- STATS -->
  <div class="stats-bar">
    <div class="stat-cell">
      <span class="stat-value" id="statMonthly">₹0</span>
      <span class="stat-label">Monthly</span>
    </div>
    <div class="stat-cell">
      <span class="stat-value" id="statDueSoon">0</span>
      <span class="stat-label">Due Soon</span>
    </div>
    <div class="stat-cell">
      <span class="stat-value" id="statActive">0</span>
      <span class="stat-label">Active</span>
    </div>
  </div>

  <!-- ACTIONS -->
  <div class="action-strip">
    <button class="action-btn secondary" id="scanBtn">
      <span class="btn-icon">🔑</span> Authorise Gmail
    </button>
    <button class="action-btn primary" id="notifBtn">
      <span class="btn-icon">🔔</span> Reminders
    </button>
  </div>

  <!-- INSTALL BANNER -->
  <div class="install-bar hidden" id="installBar">
    <div class="install-bar-top">
      <span class="install-icon">📲</span>
      <div>
        <div class="install-title">Install SubTracker</div>
        <div class="install-sub">Add to home screen for offline use &amp; reminders</div>
      </div>
    </div>
    <div class="install-btns">
      <button class="install-btn-yes" id="installBtn">Install</button>
      <button class="install-btn-skip" id="installSkip">Skip</button>
    </div>
  </div>

  <!-- NOTIFICATION BAR (shown if not yet granted) -->
  <div class="notif-bar hidden" id="notifBar">
    <span class="notif-text">🔔 Get reminders 7 days before renewal</span>
    <button class="notif-btn" id="notifEnable">Enable</button>
  </div>

  <!-- SCAN STATUS -->
  <div class="scan-status" id="scanStatus">
    <span class="scan-spinner">⏳</span>
    <span id="scanStatusText">Scanning emails…</span>
  </div>

  <!-- ALERT STRIP (due soon) -->
  <div class="alert-strip hidden" id="alertStrip">
    ⚠ Renewing within 7 days
  </div>

  <!-- FILTERS -->
  <div class="filters" id="filters">
    <button class="filter-chip active" data-filter="All">All</button>
    <button class="filter-chip" data-filter="Due Soon">Due Soon</button>
    <button class="filter-chip" data-filter="Software">Software</button>
    <button class="filter-chip" data-filter="Streaming">Streaming</button>
    <button class="filter-chip" data-filter="Telecom">Telecom</button>
    <button class="filter-chip" data-filter="Fitness">Fitness</button>
    <button class="filter-chip" data-filter="Lifestyle">Lifestyle</button>
    <button class="filter-chip" data-filter="Other">Other</button>
  </div>

  <!-- SECTION LABEL + CARDS -->
  <div class="section-label">Subscriptions</div>
  <div class="cards" id="cards"></div>
  <div class="empty" id="empty">
    <div class="empty-emoji">🔭</div>
    <div class="empty-title">No subscriptions yet</div>
    <div class="empty-sub">Tap Scan to detect from Gmail, or + to add manually.</div>
  </div>
</div>

<!-- FAB -->
<button class="fab" id="fab" aria-label="Add subscription">+</button>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- ADD/EDIT MODAL -->
<div class="backdrop" id="addBackdrop">
  <div class="modal" role="dialog" aria-modal="true" aria-label="Add Subscription">
    <div class="modal-handle"></div>
    <div class="modal-title" id="addModalTitle">Add Subscription</div>
    <div class="modal-body">
      <div class="field">
        <label>Name</label>
        <input type="text" id="fName" placeholder="e.g. Netflix"/>
      </div>
      <div class="field">
        <label>Icon</label>
        <div class="icon-picker" id="iconPicker"></div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Amount Paid (₹)</label>
          <input type="number" id="fAmount" placeholder="0" min="0" step="0.01"/>
        </div>
        <div class="field">
          <label>MRP (₹, optional)</label>
          <input type="number" id="fMrp" placeholder="0" min="0" step="0.01"/>
        </div>
      </div>
      <div class="field">
        <label>Cycle</label>
        <select id="fCycle">
          <option value="monthly">Monthly</option>
          <option value="quarterly">Quarterly</option>
          <option value="half-yearly">Half-Yearly</option>
          <option value="yearly">Yearly</option>
        </select>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Start / Last Paid</label>
          <input type="date" id="fStart"/>
        </div>
        <div class="field">
          <label>Renewal / Expiry</label>
          <input type="date" id="fEnd"/>
        </div>
      </div>
      <div class="field">
        <label>Category</label>
        <select id="fCat">

let db;

async function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(STORE)) {
        d.createObjectStore(STORE, { keyPath: 'id' });
      }
    };
    req.onsuccess = e => res(e.target.result);
    req.onerror   = e => rej(e.target.error);
  });
}
async function dbGetAll() {
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE, 'readonly');
    const req = tx.objectStore(STORE).getAll();
    req.onsuccess = () => res(req.result);
    req.onerror   = e => rej(e.target.error);
  });
}
async function dbPut(item) {
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).put(item);
    tx.oncomplete = () => res();
    tx.onerror    = e => rej(e.target.error);
  });
}
async function dbDelete(id) {
  return new Promise((res, rej) => {

/* ────────────────────────────────────────────────────────────────────────

function uid() { return 'sub-' + Date.now() + '-' + Math.random().toString(36).slice(2,7); }

function toMonthly(amount, cycle) {
  if (!amount) return 0;
  const map = { monthly:1, quarterly:3, 'half-yearly':6, yearly:12 };
  return amount / (map[cycle] || 1);
}

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const now  = new Date(); now.setHours(0,0,0,0);
  const then = new Date(dateStr); then.setHours(0,0,0,0);
  return Math.round((then - now) / 86400000);
}

function fmtDate(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr);
  return d.toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
}

function fmtINR(n) {
  if (!n) return '₹0';
  return '₹' + Math.round(n).toLocaleString('en-IN');
}

function showToast(msg, dur = 2400) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

/* ────────────────────────────────────────────────────────────────────────
   RENDER
   ──────────────────────────────────────────────────────────────────────── */
function computeRenewal(sub) {
  if (sub.endDate) return { date: sub.endDate, type: 'expires' };
  if (!sub.lastPaidDate) return { date: null, type: 'renewal' };
  const map = { monthly:1, quarterly:3, 'half-yearly':6, yearly:12 };
  const months = map[sub.cycle] || 1;
  const d = new Date(sub.lastPaidDate);
  d.setMonth(d.getMonth() + months);
  return { date: d.toISOString().slice(0,10), type: 'renewal' };
}

function render() {
  const cards = document.getElementById('cards');
  const empty  = document.getElementById('empty');
  const alert  = document.getElementById('alertStrip');

  // filter
  let list = subs.slice();
  const today = new Date(); today.setHours(0,0,0,0);

  if (activeFilter === 'Due Soon') {
    list = list.filter(s => {
      const r = computeRenewal(s); const d = daysUntil(r.date);
      return d !== null && d >= 0 && d <= 7;
    });
  } else if (activeFilter !== 'All') {
    list = list.filter(s => s.category === activeFilter);
  }

  // sort
  list.sort((a,b) => {
    if (sortMode === 'amount') return toMonthly(b.amount, b.cycle) - toMonthly(a.amount, a.cycle);
    if (sortMode === 'name')   return a.name.localeCompare(b.name);
    // date: soonest renewal first
    const ra = computeRenewal(a).date || '9999';
    const rb = computeRenewal(b).date || '9999';
    return ra.localeCompare(rb);
  });

  // alert strip
  const hasDue = subs.some(s => { const r=computeRenewal(s); const d=daysUntil(r.date); return d!==null&&d>=0&&d<=7; });
  alert.classList.toggle('hidden', !hasDue);

  // monthly total
  const monthly = subs.reduce((acc, s) => acc + toMonthly(s.amount, s.cycle), 0);
  document.getElementById('statMonthly').textContent = fmtINR(monthly);

  // due soon
  const dueCnt = subs.filter(s => { const r=computeRenewal(s); const d=daysUntil(r.date); return d!==null&&d>=0&&d<=7; }).length;
  document.getElementById('statDueSoon').textContent = dueCnt;
  document.getElementById('statActive').textContent  = subs.length;

  cards.innerHTML = '';
  if (list.length === 0) { empty.classList.add('show'); return; }
  empty.classList.remove('show');

  for (const sub of list) {
    const ren = computeRenewal(sub);
    const days = daysUntil(ren.date);

    const card = document.createElement('div');
    card.className = 'card';
    if (days !== null && days >= 0 && days <= 3) card.classList.add('due-critical');
    else if (days !== null && days >= 0 && days <= 7) card.classList.add('due-soon');

    const savings = (sub.mrp && sub.amount && sub.mrp > sub.amount) ? sub.mrp - sub.amount : 0;
    const dateLabel = ren.date
      ? (days === 0 ? 'Today' : days === 1 ? 'Tomorrow' : days !== null && days >= 0 && days <= 30 ? `in ${days}d` : fmtDate(ren.date))
      : '—';
    const dateClass = days !== null && days >= 0 && days <= 3 ? 'crit' : days !== null && days >= 0 && days <= 7 ? 'warn' : '';
    const renewLabel = ren.type === 'expires' ? 'Expires' : 'Renews';

    card.innerHTML = `
      <div class="card-icon">${sub.icon || '📦'}</div>
      <div class="card-body">
        <div class="card-name">${sub.name}</div>
        <div class="card-meta">
          <span class="card-cycle">${sub.cycle}</span>
          <span class="card-category">${sub.category}</span>
        </div>
        <div class="card-date ${dateClass}">${renewLabel}: ${dateLabel}</div>
        ${sub.bundledVia ? `<span class="card-bundled">via ${sub.bundledVia}</span>` : ''}
      </div>
      <div class="card-right">
        <div class="card-amount">${sub.bundledVia ? '<span style="color:var(--green);font-size:12px">FREE</span>' : fmtINR(sub.amount)}</div>
        ${sub.mrp && !sub.bundledVia ? `<div class="card-mrp">${fmtINR(sub.mrp)}</div>` : ''}
        ${savings && !sub.bundledVia ? `<div class="card-savings">save ${fmtINR(savings)}</div>` : ''}
      </div>
    `;
    card.addEventListener('click', () => openDetail(sub.id));
    cards.appendChild(card);
  }
}

   GMAIL SCAN — OAuth + live fetch + Gemini analysis
   ──────────────────────────────────────────────────────────────────────── */
function setScanBtn(state) {
  const btn = document.getElementById('scanBtn');
  const map = {
    auth:    { icon: '🔑', label: 'Authorise Gmail' },
    scan:    { icon: '⦿',  label: 'Gmail Scan' },
    refresh: { icon: '↻',  label: 'Refresh' },
  };

  btn.disabled = false;
}

function initGoogleAuth() {
  if (!window.google?.accounts?.oauth2) return;
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: 'https://www.googleapis.com/auth/gmail.readonly',
    callback: async (response) => {
      if (response.error) {
        showToast('Google auth failed: ' + response.error, 4000);
        setScanBtn('auth');
        document.getElementById('scanStatus').classList.remove('show');
        return;
      }
      gmailAccessToken = response.access_token;
      await fetchAndScan();
    },
  });
}

async function fetchGmailEmails() {
  const statusText = document.getElementById('scanStatusText');
  statusText.textContent = 'Fetching emails from Gmail…';

  // Paginate through all results
  const messages = [];
  let pageToken = null;
  do {
    const url = `https://gmail.googleapis.com/gmail/v1/users/me/messages?q=${encodeURIComponent(GMAIL_QUERY)}&maxResults=500${pageToken ? '&pageToken=' + pageToken : ''}`;
    const listRes = await fetch(url, { headers: { Authorization: `Bearer ${gmailAccessToken}` } });
    if (!listRes.ok) throw new Error('Gmail fetch failed — check OAuth scope');
    const listData = await listRes.json();
    messages.push(...(listData.messages || []));
    pageToken = listData.nextPageToken || null;
  } while (pageToken);

  statusText.textContent = `Reading ${messages.length} emails…`;

  const emails = [];
  for (let i = 0; i < messages.length; i += 10) {
    const batch = messages.slice(i, i + 10);
    const results = await Promise.all(batch.map(async (msg) => {
      const r = await fetch(
        `https://gmail.googleapis.com/gmail/v1/users/me/messages/${msg.id}?format=metadata&metadataHeaders=Subject&metadataHeaders=From&metadataHeaders=Date`,
        { headers: { Authorization: `Bearer ${gmailAccessToken}` } }
      );
      const data = await r.json();
      const headers = data.payload?.headers || [];
      const get = (name) => headers.find(h => h.name === name)?.value || '';
      return { subject: get('Subject'), from: get('From'), date: get('Date'), snippet: data.snippet || '' };
    }));
    emails.push(...results);
  }
  return emails;
}

async function fetchAndScan() {
  const status = document.getElementById('scanStatus');
  const statusText = document.getElementById('scanStatusText');
  const scanBtn = document.getElementById('scanBtn');

  try {
    const emails = await fetchGmailEmails();
    statusText.textContent = 'Analysing with AI…';

    const prompt = `You are a subscription detector. Analyse these email objects and identify recurring subscriptions, memberships, or services the user pays for.

Return ONLY a valid JSON array — no markdown, no explanation, no code fences.

Each item must match this schema exactly:
{ "name": string, "icon": one emoji, "amount": number (INR, 0 if free/unknown), "mrp": number (full price if discounted, else 0), "cycle": "monthly"|"quarterly"|"half-yearly"|"yearly", "lastPaidDate": "YYYY-MM-DD" or "", "endDate": "YYYY-MM-DD" or "", "category": "Software"|"Streaming"|"Telecom"|"Fitness"|"Lifestyle"|"News"|"Other", "source": "gmail", "bundledVia": "" }

Rules:
- Only include recurring subscriptions — ignore one-time purchases, shipping, hardware
- Ignore refund, cancellation, failed payment, and chargeback emails
- If the same service appears in multiple emails, output it once using the most recent email's data
- Convert USD→INR at 84, GBP→INR at 106, EUR→INR at 90
- If a service is free because it is bundled with another (e.g. Prime via Airtel), set amount=0 and bundledVia to the parent service
- Trials count as subscriptions; set amount to the trial price (0 if free trial)
- If cycle is ambiguous, infer from the amount and service type

Emails:
${JSON.stringify(emails, null, 2)}`;

    const r = await fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
    });

    if (!r.ok) throw new Error(`Worker error ${r.status}: ${await r.text()}`);

    const data = await r.json();
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '[]';
    let parsed;
    try { parsed = JSON.parse(text.replace(/```json|```/g, '').trim()); }
    catch { throw new Error('Could not parse AI response'); }

    let added = 0;
    for (const item of parsed) {
      const existing = subs.find(s => s.name.toLowerCase() === item.name?.toLowerCase());
      if (existing) continue;
      const sub = { id: uid(), ...item };
      await dbPut(sub);
      subs.push(sub);
      added++;
    }
    render();
    showToast(added > 0 ? `Found ${added} new subscription${added > 1 ? 's' : ''}` : 'No new subscriptions found');
  } catch (e) {
    console.error(e);
    showToast('Scan failed: ' + e.message, 4000);
  } finally {
    status.classList.remove('show');
    setScanBtn('refresh');
  }
}

function scanGmail() {
  if (!tokenClient) {
    showToast('Google auth not initialised — check Client ID', 4000);
    return;
  }
  const btn = document.getElementById('scanBtn');
  btn.disabled = true;

  // If we already have a token, skip the OAuth popup and scan directly
  if (gmailAccessToken) {

}

  const perm = await Notification.requestPermission();
  document.getElementById('notifBar').classList.add('hidden');
  if (perm === 'granted') {
    showToast('Reminders enabled ✓');
    scheduleNotifications();
  } else {
    showToast('Notifications blocked');
  }
}

function scheduleNotifications() {
  if (Notification.permission !== 'granted') return;
  for (const sub of subs) {
    const ren = computeRenewal(sub);
    const days = daysUntil(ren.date);
    if (days !== null && days >= 0 && days <= 7) {
      const msg = days === 0
        ? `${sub.name} ${ren.type}s today!`
        : `${sub.name} ${ren.type}s in ${days} day${days>1?'s':''}`;
      new Notification('SubTracker', { body: msg, icon: '/icon-192.png' });
    }
  }
}

(async () => {
  db = await openDB();

  // Remove any previously hardcoded seed entries
  const all = await dbGetAll();
  for (const s of all) {
    if (s.source === 'seed') await dbDelete(s.id);
  }
  subs = (await dbGetAll());
  render();

  if ('Notification' in window && Notification.permission !== 'granted' && Notification.permission !== 'denied') {
    document.getElementById('notifBar').classList.remove('hidden');
  }

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/Subscription-Tracker/sw.js').catch(console.warn);
  }

  // Init Google OAuth — works whether GIS script loaded before or after this runs
  if (window.google?.accounts?.oauth2) {
    initGoogleAuth();
  } else {
    document.querySelector('script[src*="accounts.google.com"]')
      ?.addEventListener('load', initGoogleAuth);
  }
})();
</script>
</body>
</html>
